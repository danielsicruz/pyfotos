<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servidor de Fotos - Controle</title>
</head>

<body>
    <h1>Painel de Controle do Totem</h1>

    <section>
        <h3>Controle da TV</h3>
        <form action="/tv/on" method="post" style="display:inline;">
            <button type="submit" class="on">Ligar TV</button>
        </form>
        <form action="/tv/off" method="post" style="display:inline;">
            <button type="submit" class="off">Desligar TV</button>
        </form>
    </section>

    <hr>

    <section>
        <h3>Controle de Exibição (Slideshow)</h3>
        <form action="/slideshow/start" method="post" style="display:inline;">
            <button type="submit" class="play">Iniciar Slideshow</button>
        </form>
        <form action="/slideshow/stop" method="post" style="display:inline;">
            <button type="submit" class="stop">Parar Slideshow</button>
        </form>
    </section>

    <hr>

    <section>
    <h2>Enviar Novos Arquivos</h2>
    <form id="uploadForm">
        <input type="file" id="fileInput" name="file" multiple required>
        <br>
        <button type="submit" class="upload">Enviar Arquivos</button>
    </form>
    
    <div id="progressContainer" style="display:none; margin-top: 20px; background: #ddd; border-radius: 10px; overflow: hidden;">
        <div id="progressBar" style="width: 0%; height: 20px; background: #7B1FA2; transition: width 0.2s;"></div>
    </div>
    <p id="status"></p>
</section>

<script>
    const uploadForm = document.getElementById('uploadForm');
    const fileInput = document.getElementById('fileInput');
    const progressBar = document.getElementById('progressBar');
    const progressContainer = document.getElementById('progressContainer');
    const status = document.getElementById('status');

    uploadForm.onsubmit = function(e) {
        e.preventDefault();
        
        const files = fileInput.files;
        if (files.length === 0) return;

        const formData = new FormData();
        for (let i = 0; i < files.length; i++) {
            formData.append('file', files[i]);
        }

        const xhr = new XMLHttpRequest();
        
        // Monitora o progresso
        xhr.upload.onprogress = function(e) {
            if (e.lengthComputable) {
                const percentComplete = (e.loaded / e.total) * 100;
                progressContainer.style.display = 'block';
                progressBar.style.width = percentComplete + '%';
                status.innerText = `Enviando: ${Math.round(percentComplete)}%`;
            }
        };

        xhr.onload = function() {
            if (xhr.status === 200) {
                status.innerText = "Upload concluído! Atualizando...";
                setTimeout(() => window.location.reload(), 1000);
            } else {
                status.innerText = "Erro no upload.";
            }
        };

        xhr.open('POST', '/upload', true);
        xhr.send(formData);
    };
</script>

    <section>
        <h2>Galeria de Mídia</h2>
        <div class="gallery">
            {% for image in images %}
            <div class="card">
                <img src="{{ url_for('uploaded_file', filename=image) }}">
                <br>
                <a href="/delete/{{ image }}" class="delete-btn">Excluir</a>
            </div>
            {% endfor %}
        </div>
    </section>
</body>

<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        text-align: center;
        margin: 20px auto;
        max-width: 1000px;
        background-color: #f4f4f9;
        color: #333;
    }

    h1 { color: #2c3e50; }
    
    section {
        margin-bottom: 30px;
        padding: 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    hr { border: 0; height: 1px; background: #ddd; margin: 20px 0; }

    button {
        padding: 12px 24px;
        font-size: 16px;
        margin: 5px;
        cursor: pointer;
        border: none;
        border-radius: 4px;
        transition: opacity 0.2s;
    }

    button:hover { opacity: 0.8; }

    .on { background-color: #4CAF50; color: white; }
    .off { background-color: #f44336; color: white; }
    
    /* Novos estilos para os botões do VLC */
    .play { background-color: #2196F3; color: white; }
    .stop { background-color: #607D8B; color: white; }
    .upload { background-color: #7B1FA2; color: white; margin-top: 15px; }

    .gallery {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 15px;
    }

    .card {
        background: #eee;
        padding: 10px;
        border-radius: 5px;
    }

    .card img {
        width: 180px;
        height: 180px;
        object-fit: cover;
        border-radius: 3px;
        display: block;
        margin-bottom: 8px;
    }

    .delete-btn {
        color: #f44336;
        text-decoration: none;
        font-weight: bold;
        font-size: 14px;
    }

    .delete-btn:hover { text-decoration: underline; }
</style>

</html>
